<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Money Mentor</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
    <h1>
        <span class="icon">💰</span>
        AI Money Mentor
    </h1>
</header>

<!-- FIRE + SCORE -->
<div class="grid">

<div class="card">
<h2>🔥 FIRE Planner</h2>
<input id="age" placeholder="Age">
<input id="income" placeholder="Monthly Income">
<input id="expenses" placeholder="Monthly Expenses">
<button onclick="getFire()">Generate Plan</button>
<div id="fireResult" class="result"></div>
</div>

<div class="card">
<h2>📊 Financial Score</h2>
<input id="income2" placeholder="Monthly Income">
<input id="savings" placeholder="Savings">
<button onclick="getScore()">Check Score</button>
<div id="scoreResult" class="result"></div>
</div>

</div>

<!-- CHAT -->
<div class="card full">
<h2>🤖 AI Advisor</h2>
<input id="question" placeholder="Ask about money...">

<div class="row">
<button onclick="askAI()">Ask</button>
<button onclick="startVoice()">🎙️ Speak</button>
</div>

<div id="chatResult" class="result"></div>
</div>

<footer>
<p>Smart Finance Dashboard</p>
</footer>

</div>

<script src="script.js"></script>
</body>
</html>
